<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none" role="img" aria-label="Open Graph: Edukasi & Riset Djamojo">
  <defs>
    <linearGradient id="og-bg-edu" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#faf6f1"/>
      <stop offset="1" stop-color="#fdf8ec"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#og-bg-edu)"/>

  <text x="60" y="100" font-family="Inter, sans-serif" font-size="14" letter-spacing="4" fill="#9c6f44">EDUKASI &amp; RISET</text>
  <text x="60" y="200" font-family="Georgia, serif" font-size="74" font-weight="700" fill="#314b20">Buka Kulkas Ilmu,</text>
  <text x="60" y="282" font-family="Georgia, serif" font-size="74" font-weight="700" fill="#c79919">Pahami Dampaknya.</text>
  <line x1="60" y1="320" x2="180" y2="320" stroke="#c79919" stroke-width="2"/>
  <text x="60" y="362" font-family="Inter, sans-serif" font-size="20" fill="#314b20">Teori Ekonomi Sirkular · Regulasi · Studi Kasus UMKM</text>

  <!-- Pill row -->
  <g transform="translate(60,400)">
    <rect width="170" height="34" rx="17" fill="#314b20"/>
    <text x="85" y="22" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#fdf8ec">SDGs 12.5</text>

    <g transform="translate(185,0)">
      <rect width="200" height="34" rx="17" fill="#314b20"/>
      <text x="100" y="22" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#fdf8ec">Permen LHK P.75</text>
    </g>

    <g transform="translate(400,0)">
      <rect width="220" height="34" rx="17" fill="#314b20"/>
      <text x="110" y="22" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#fdf8ec">Life Cycle Assessment</text>
    </g>
  </g>

  <g transform="translate(60,460)">
    <rect width="200" height="40" rx="20" fill="#c79919"/>
    <text x="100" y="26" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="600" letter-spacing="1.5" fill="#314b20">#BotolKacaPunyaCerita</text>
  </g>

  <!-- Right side: open book illustration -->
  <g transform="translate(820,150)">
    <!-- Book base -->
    <path d="M0 100 L0 280 L160 300 L160 100 Z" fill="#fdf8ec" stroke="#314b20" stroke-width="2"/>
    <path d="M160 100 L160 300 L320 280 L320 100 Z" fill="#fdf8ec" stroke="#314b20" stroke-width="2"/>
    <line x1="160" y1="100" x2="160" y2="300" stroke="#314b20" stroke-width="2"/>
    <!-- Lines on left page -->
    <g stroke="#9c6f44" stroke-width="1" opacity="0.5">
      <line x1="20" y1="140" x2="140" y2="135"/>
      <line x1="20" y1="160" x2="140" y2="155"/>
      <line x1="20" y1="180" x2="140" y2="175"/>
      <line x1="20" y1="200" x2="100" y2="196"/>
    </g>
    <!-- Lines on right page -->
    <g stroke="#9c6f44" stroke-width="1" opacity="0.5">
      <line x1="180" y1="135" x2="300" y2="140"/>
      <line x1="180" y1="155" x2="300" y2="160"/>
      <line x1="180" y1="175" x2="300" y2="180"/>
      <line x1="180" y1="195" x2="280" y2="199"/>
    </g>
    <!-- Diagram on right page -->
    <circle cx="240" cy="240" r="40" fill="none" stroke="#5d8a3f" stroke-width="2" stroke-dasharray="4 4"/>
    <text x="240" y="244" text-anchor="middle" font-family="Georgia, serif" font-size="11" font-weight="700" fill="#314b20">CIRCULAR</text>
  </g>

  <text x="1140" y="600" text-anchor="end" font-family="Inter, sans-serif" font-size="13" letter-spacing="2" fill="#9c6f44">DJAMOJO.ID/EDUKASI</text>
</svg>
