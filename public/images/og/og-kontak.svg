<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none" role="img" aria-label="Open Graph: Kontak Djamojo">
  <defs>
    <linearGradient id="og-bg-kon" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#314b20"/>
      <stop offset="1" stop-color="#4a7230"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#og-bg-kon)"/>

  <text x="60" y="100" font-family="Inter, sans-serif" font-size="14" letter-spacing="4" fill="#c79919">HUBUNGI KAMI</text>
  <text x="60" y="210" font-family="Georgia, serif" font-size="80" font-weight="700" fill="#fdf8ec">Mari Berkenalan,</text>
  <text x="60" y="298" font-family="Georgia, serif" font-size="80" font-weight="700" fill="#c79919">Mari Berjamu.</text>
  <line x1="60" y1="340" x2="180" y2="340" stroke="#c79919" stroke-width="2"/>
  <text x="60" y="380" font-family="Inter, sans-serif" font-size="20" fill="#e2ecd9">WhatsApp · Email · Instagram · Drop Point Bandung</text>

  <!-- Contact channels -->
  <g transform="translate(60,440)">
    <rect width="160" height="50" rx="10" fill="#25D366"/>
    <text x="80" y="30" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#fdf8ec">WhatsApp</text>

    <g transform="translate(175,0)">
      <rect width="140" height="50" rx="10" fill="#c79919"/>
      <text x="70" y="30" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#314b20">Email</text>
    </g>

    <g transform="translate(330,0)">
      <rect width="140" height="50" rx="10" fill="#9c6f44"/>
      <text x="70" y="30" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#fdf8ec">Instagram</text>
    </g>
  </g>

  <g transform="translate(60,520)">
    <rect width="240" height="40" rx="20" fill="#c79919"/>
    <text x="120" y="26" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="600" letter-spacing="1.5" fill="#314b20">#SirkularBersamaDjamojo</text>
  </g>

  <!-- Right: location pin -->
  <g transform="translate(880,200)">
    <path d="M100 0 Q40 0 40 60 Q40 110 100 200 Q160 110 160 60 Q160 0 100 0 Z" fill="#c79919"/>
    <circle cx="100" cy="60" r="28" fill="#fdf8ec"/>
    <text x="100" y="68" text-anchor="middle" font-family="Georgia, serif" font-size="20" font-weight="700" fill="#314b20">BDG</text>
    <text x="100" y="260" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" letter-spacing="2" fill="#c79919">KOTA BANDUNG</text>
  </g>

  <text x="1140" y="600" text-anchor="end" font-family="Inter, sans-serif" font-size="13" letter-spacing="2" fill="#c79919">DJAMOJO.ID/KONTAK</text>
