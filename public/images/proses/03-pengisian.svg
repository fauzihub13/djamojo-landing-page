<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" fill="none" role="img" aria-label="Pengisian botol kaca Djamojo dengan corong">
  <defs>
    <linearGradient id="bg-bb3" x1="0" y1="0" x2="500" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#faf6f1"/>
      <stop offset="1" stop-color="#e2ecd9"/>
    </linearGradient>
  </defs>
  <rect width="500" height="400" fill="url(#bg-bb3)"/>

  <!-- Conveyor / meja -->
  <rect x="40" y="350" width="420" height="20" fill="#9c6f44" stroke="#5a3d1c" stroke-width="1.5"/>
  <line x1="40" y1="360" x2="460" y2="360" stroke="#5a3d1c" stroke-width="1"/>

  <!-- Bottle 1 (kiri, hampir penuh) -->
  <g transform="translate(70,180)">
    <rect x="22" y="0" width="36" height="14" rx="3" fill="#5d8a3f"/>
    <path d="M26 14 L26 30 L20 36 L20 160 Q20 168 28 168 L52 168 Q60 168 60 160 L60 36 L54 30 L54 14 Z" fill="#f5fbf1" stroke="#5d8a3f" stroke-width="1.5"/>
    <path d="M22 70 L22 160 Q22 166 28 166 L52 166 Q58 166 58 160 L58 70 Z" fill="#a87a0c"/>
    <ellipse cx="40" cy="70" rx="18" ry="2" fill="#c79919"/>
    <ellipse cx="40" cy="70" rx="18" ry="1" fill="#fdf8ec" opacity="0.5"/>
  </g>

  <!-- Bottle 2 (tengah, sedang diisi) -->
  <g transform="translate(200,180)">
    <rect x="22" y="0" width="36" height="14" rx="3" fill="#5d8a3f"/>
    <path d="M26 14 L26 30 L20 36 L20 160 Q20 168 28 168 L52 168 Q60 168 60 160 L60 36 L54 30 L54 14 Z" fill="#f5fbf1" stroke="#5d8a3f" stroke-width="1.5"/>
    <path d="M22 100 L22 160 Q22 166 28 166 L52 166 Q58 166 58 160 L58 100 Z" fill="#a87a0c"/>
    <ellipse cx="40" cy="100" rx="18" ry="2" fill="#c79919"/>
    <!-- Corong + aliran -->
    <path d="M28 -10 L52 -10 L48 0 L32 0 Z" fill="#9c6f44" stroke="#5a3d1c" stroke-width="1.5"/>
    <rect x="35" y="0" width="10" height="14" fill="#a87a0c"/>
    <path d="M30 6 L50 6 L46 14 L34 14 Z" fill="#a87a0c" opacity="0.6"/>
    <!-- Splash -->
    <circle cx="25" cy="98" r="2" fill="#c79919" opacity="0.7"/>
    <circle cx="55" cy="96" r="1.5" fill="#c79919" opacity="0.7"/>
  </g>

  <!-- Bottle 3 (kanan, kosong) -->
  <g transform="translate(330,180)">
    <rect x="22" y="0" width="36" height="14" rx="3" fill="#5d8a3f"/>
    <path d="M26 14 L26 30 L20 36 L20 160 Q20 168 28 168 L52 168 Q60 168 60 160 L60 36 L54 30 L54 14 Z" fill="#f5fbf1" stroke="#5d8a3f" stroke-width="1.5"/>
  </g>

  <!-- Tangki penampung di atas -->
  <g transform="translate(360,40)">
    <ellipse cx="50" cy="10" rx="50" ry="8" fill="#9c6f44" stroke="#5a3d1c" stroke-width="2"/>
    <rect x="0" y="10" width="100" height="50" fill="#9c6f44" stroke="#5a3d1c" stroke-width="2"/>
    <ellipse cx="50" cy="60" rx="50" ry="8" fill="#5a3d1c"/>
    <rect x="40" y="60" width="20" height="40" fill="#5a3d1c" stroke="#314b20" stroke-width="1.5"/>
    <!-- Isi dalam tangki -->
    <rect x="4" y="22" width="92" height="36" fill="#a87a0c"/>
    <ellipse cx="50" cy="22" rx="46" ry="4" fill="#c79919"/>
  </g>

  <!-- Tetes jamu dari tangki ke corong -->
  <path d="M410 145 L410 165" stroke="#a87a0c" stroke-width="3"/>
  <ellipse cx="410" cy="170" rx="3" ry="5" fill="#a87a0c"/>

  <!-- Title -->
  <text x="250" y="35" text-anchor="middle" font-family="Georgia, serif" font-size="18" font-weight="700" fill="#314b20">Pengisian Botol Kaca</text>
  <text x="250" y="55" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" letter-spacing="2" fill="#9c6f44">LANGKAH 3 · HIGIENIS · BATCH KECIL</text>
</svg>
