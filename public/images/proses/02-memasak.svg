<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" fill="none" role="img" aria-label="Proses memasak jamu tradisional di atas tungku">
  <defs>
    <linearGradient id="bg-bb2" x1="0" y1="0" x2="500" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#faf6f1"/>
      <stop offset="1" stop-color="#f0d9c0"/>
    </linearGradient>
  </defs>
  <rect width="500" height="400" fill="url(#bg-bb2)"/>

  <!-- Tungku -->
  <g transform="translate(120,210)">
    <!-- Base -->
    <rect x="0" y="80" width="160" height="80" fill="#5a3d1c" stroke="#314b20" stroke-width="2"/>
    <rect x="0" y="80" width="160" height="10" fill="#3d2810"/>
    <!-- Cerobong -->
    <rect x="120" y="0" width="30" height="80" fill="#5a3d1c" stroke="#314b20" stroke-width="2"/>
    <!-- Api -->
    <ellipse cx="40" cy="130" rx="12" ry="18" fill="#c79919"/>
    <ellipse cx="40" cy="125" rx="8" ry="12" fill="#e3a019"/>
    <ellipse cx="40" cy="118" rx="4" ry="6" fill="#fdf8ec"/>
    <ellipse cx="55" cy="135" rx="10" ry="14" fill="#c79919"/>
    <ellipse cx="55" cy="130" rx="6" ry="10" fill="#e3a019"/>
    <!-- Asap -->
    <ellipse cx="135" cy="-10" rx="8" ry="12" fill="#9c6f44" opacity="0.4"/>
    <ellipse cx="135" cy="-30" rx="10" ry="15" fill="#9c6f44" opacity="0.3"/>
    <ellipse cx="135" cy="-55" rx="12" ry="18" fill="#9c6f44" opacity="0.2"/>
    <ellipse cx="135" cy="-80" rx="14" ry="22" fill="#9c6f44" opacity="0.1"/>
  </g>

  <!-- Panci -->
  <g transform="translate(170,150)">
    <ellipse cx="40" cy="60" rx="40" ry="8" fill="#314b20" opacity="0.3"/>
    <rect x="0" y="0" width="80" height="60" rx="6" fill="#9c6f44" stroke="#5a3d1c" stroke-width="2"/>
    <ellipse cx="40" cy="0" rx="40" ry="6" fill="#5a3d1c" stroke="#314b20" stroke-width="2"/>
    <!-- Isi jamu -->
    <ellipse cx="40" cy="0" rx="36" ry="4" fill="#a87a0c"/>
    <ellipse cx="40" cy="-1" rx="30" ry="2" fill="#c79919"/>
    <!-- Bubble -->
    <circle cx="20" cy="-3" r="2" fill="#e3a019" opacity="0.7"/>
    <circle cx="55" cy="-5" r="1.5" fill="#e3a019" opacity="0.7"/>
    <circle cx="40" cy="-7" r="2.5" fill="#e3a019" opacity="0.7"/>
    <!-- Handle -->
    <rect x="78" y="20" width="40" height="6" rx="2" fill="#5a3d1c" stroke="#314b20" stroke-width="1.5"/>
  </g>

  <!-- Sendok pengaduk (kiri) -->
  <g transform="translate(60,180)">
    <rect x="0" y="0" width="80" height="4" fill="#9c6f44" stroke="#5a3d1c" stroke-width="1"/>
    <ellipse cx="0" cy="2" rx="6" ry="10" fill="#9c6f44" stroke="#5a3d1c" stroke-width="1"/>
  </g>

  <!-- Hands stirring -->
  <g transform="translate(40,150)">
    <ellipse cx="30" cy="15" rx="22" ry="14" fill="#f0d0a8" stroke="#9c6f44" stroke-width="1.5"/>
    <ellipse cx="20" cy="8" rx="6" ry="4" fill="#f0d0a8" stroke="#9c6f44" stroke-width="1.2"/>
    <ellipse cx="32" cy="5" rx="6" ry="4" fill="#f0d0a8" stroke="#9c6f44" stroke-width="1.2"/>
    <ellipse cx="44" cy="9" rx="6" ry="4" fill="#f0d0a8" stroke="#9c6f44" stroke-width="1.2"/>
  </g>

  <!-- Bumbu herbs around -->
  <g transform="translate(380,180)">
    <path d="M0 30 Q15 0 30 5 Q25 30 5 35 Z" fill="#5d8a3f" opacity="0.8"/>
    <path d="M40 20 Q55 -5 70 0 Q60 30 45 25 Z" fill="#5d8a3f" opacity="0.8"/>
    <path d="M20 50 Q35 30 50 35 Q40 60 25 55 Z" fill="#5d8a3f" opacity="0.8"/>
  </g>

  <!-- Title -->
  <text x="250" y="35" text-anchor="middle" font-family="Georgia, serif" font-size="18" font-weight="700" fill="#314b20">Pemasakan Tradisional</text>
  <text x="250" y="55" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" letter-spacing="2" fill="#9c6f44">LANGKAH 2 · TUNGKU KAYU · RESEP NUSANTARA</text>
</svg>
