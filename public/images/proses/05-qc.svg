<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" fill="none" role="img" aria-label="Quality control: inspeksi visual dengan senter UV-C">
  <defs>
    <linearGradient id="bg-bb5" x1="0" y1="0" x2="500" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#e2ecd9"/>
      <stop offset="1" stop-color="#faf6f1"/>
    </linearGradient>
    <radialGradient id="uvbeam" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#c79919" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#c79919" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="500" height="400" fill="url(#bg-bb5)"/>

  <!-- Background box (inspeksi booth) -->
  <rect x="60" y="80" width="380" height="280" fill="#fdf8ec" stroke="#5d8a3f" stroke-width="2"/>
  <text x="250" y="100" text-anchor="middle" font-family="Inter, sans-serif" font-size="8" letter-spacing="2" fill="#9c6f44">QUALITY CONTROL BOOTH</text>

  <!-- Meja -->
  <rect x="80" y="280" width="340" height="10" fill="#9c6f44"/>
  <line x1="80" y1="290" x2="420" y2="290" stroke="#5a3d1c" stroke-width="1"/>

  <!-- Botol di tengah (inspeksi) -->
  <g transform="translate(220,150)">
    <rect x="14" y="0" width="32" height="14" rx="2" fill="#5d8a3f"/>
    <path d="M18 14 L18 28 L14 32 L14 130 Q14 138 22 138 L38 138 Q46 138 46 130 L46 32 L42 28 L42 14 Z" fill="#f5fbf1" stroke="#5d8a3f" stroke-width="1.5"/>
    <path d="M16 70 L16 130 Q16 136 22 136 L38 136 Q44 136 44 130 L44 70 Z" fill="#a87a0c"/>
    <ellipse cx="30" cy="70" rx="14" ry="2" fill="#c79919"/>
    <!-- Label -->
    <rect x="16" y="90" width="28" height="40" rx="1" fill="#fdf8ec" stroke="#9c6f44" stroke-width="0.8"/>
    <rect x="16" y="90" width="28" height="6" rx="1" fill="#5d8a3f"/>
    <text x="30" y="95" text-anchor="middle" font-family="Georgia, serif" font-size="3.5" font-weight="700" fill="#fdf8ec">DJAMOJO</text>
  </g>

  <!-- Sinar UV dari kiri -->
  <g transform="translate(100,150)">
    <!-- Senter -->
    <rect x="0" y="20" width="30" height="20" rx="3" fill="#5a3d1c" stroke="#314b20" stroke-width="1.5"/>
    <circle cx="30" cy="30" r="6" fill="#c79919" stroke="#9c7711" stroke-width="1"/>
    <!-- Beam -->
    <path d="M36 24 L250 10 L250 50 L36 36 Z" fill="url(#uvbeam)"/>
    <!-- Particles -->
    <circle cx="120" cy="20" r="1" fill="#c79919" opacity="0.6"/>
    <circle cx="160" cy="30" r="1.5" fill="#c79919" opacity="0.6"/>
    <circle cx="200" cy="22" r="1" fill="#c79919" opacity="0.6"/>
  </g>

  <!-- QC Inspector (kanan) -->
  <g transform="translate(360,120)">
    <!-- Body -->
    <ellipse cx="30" cy="80" rx="28" ry="20" fill="#5d8a3f"/>
    <!-- Head -->
    <circle cx="30" cy="40" r="22" fill="#f0d0a8" stroke="#9c6f44" stroke-width="1.5"/>
    <!-- Hair -->
    <path d="M8 40 Q8 18 30 15 Q52 18 52 40 Q52 30 45 28 Q40 25 30 26 Q20 25 15 28 Q8 30 8 40 Z" fill="#314b20"/>
    <!-- Eye (mengintensif) -->
    <circle cx="24" cy="40" r="2" fill="#314b20"/>
    <!-- Glasses -->
    <circle cx="24" cy="40" r="5" fill="none" stroke="#5a3d1c" stroke-width="1.5"/>
    <circle cx="36" cy="40" r="5" fill="none" stroke="#5a3d1c" stroke-width="1.5"/>
    <line x1="29" y1="40" x2="31" y2="40" stroke="#5a3d1c" stroke-width="1.5"/>
    <!-- Smile -->
    <path d="M22 50 Q30 54 38 50" stroke="#5a3d1c" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    <!-- Coat collar -->
    <path d="M10 70 L50 70 L52 90 L8 90 Z" fill="#fdf8ec" stroke="#9c6f44" stroke-width="1"/>
  </g>

  <!-- Checklist kanan bawah -->
  <g transform="translate(80,310)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="9" font-weight="600" fill="#5d8a3f">✓ Bebas keretakan</text>
    <text x="150" y="0" font-family="Inter, sans-serif" font-size="9" font-weight="600" fill="#5d8a3f">✓ Label rapi</text>
    <text x="260" y="0" font-family="Inter, sans-serif" font-size="9" font-weight="600" fill="#5d8a3f">✓ Volume sesuai</text>
    <text x="0" y="15" font-family="Inter, sans-serif" font-size="9" font-weight="600" fill="#5d8a3f">✓ Tutup tersegel</text>
    <text x="150" y="15" font-family="Inter, sans-serif" font-size="9" font-weight="600" fill="#5d8a3f">✓ Tanpa partikel</text>
    <text x="260" y="15" font-family="Inter, sans-serif" font-size="9" font-weight="600" fill="#5d8a3f">✓ Exp date valid</text>
  </g>

  <!-- Title -->
  <text x="250" y="35" text-anchor="middle" font-family="Georgia, serif" font-size="18" font-weight="700" fill="#314b20">Inspeksi Quality Control</text>
  <text x="250" y="55" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" letter-spacing="2" fill="#9c6f44">LANGKAH 5 · UV-C · 100% MANUAL CHECK</text>
</svg>
