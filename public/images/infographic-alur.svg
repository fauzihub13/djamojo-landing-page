<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" fill="none" role="img" aria-label="Alur 4 langkah return bottle Djamojo">
  <defs>
    <linearGradient id="bgFlow" x1="0" y1="0" x2="1200" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#faf6f1"/>
      <stop offset="1" stop-color="#fdf8ec"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#5d8a3f"/>
    </marker>
  </defs>

  <rect width="1200" height="520" fill="url(#bgFlow)"/>

  <!-- Title -->
  <text x="600" y="50" text-anchor="middle" font-family="Georgia, serif" font-size="24" font-weight="700" fill="#314b20">Alur Return Bottle Djamojo</text>
  <text x="600" y="74" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" letter-spacing="2" fill="#9c6f44">SOP 4.2 · DARI KONSUMEN KE DROP POINT</text>

  <!-- Connector line -->
  <line x1="120" y1="280" x2="1080" y2="280" stroke="#5d8a3f" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrow)"/>

  <!-- Step 1: Nikmati -->
  <g transform="translate(60,180)">
    <circle cx="60" cy="100" r="55" fill="#fdf8ec" stroke="#5d8a3f" stroke-width="2"/>
    <text x="60" y="50" text-anchor="middle" font-family="Georgia, serif" font-size="34" font-weight="700" fill="#c79919">01</text>
    <!-- Bottle icon -->
    <g transform="translate(40,80)">
      <rect x="16" y="-2" width="8" height="3" fill="#5d8a3f"/>
      <path d="M14 4 L14 12 L12 14 L12 36 Q12 40 16 40 L24 40 Q28 40 28 36 L28 14 L26 12 L26 4 Z" fill="#e2ecd9" stroke="#5d8a3f" stroke-width="1.2"/>
      <rect x="14" y="22" width="12" height="14" fill="#e3b73b"/>
    </g>
    <text x="60" y="190" text-anchor="middle" font-family="Georgia, serif" font-size="14" font-weight="700" fill="#314b20">Nikmati Jamu</text>
    <text x="60" y="210" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#9c6f44">Habiskan isi botol</text>
    <text x="60" y="224" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#9c6f44">Djamojo favoritmu</text>
  </g>

  <!-- Step 2: Bilas -->
  <g transform="translate(340,180)">
    <circle cx="60" cy="100" r="55" fill="#fdf8ec" stroke="#5d8a3f" stroke-width="2"/>
    <text x="60" y="50" text-anchor="middle" font-family="Georgia, serif" font-size="34" font-weight="700" fill="#c79919">02</text>
    <!-- Water drop icon -->
    <g transform="translate(45,80)">
      <path d="M15 0 Q5 14 5 22 Q5 30 15 30 Q25 30 25 22 Q25 14 15 0 Z" fill="#7da5c4" opacity="0.85"/>
      <ellipse cx="11" cy="18" rx="3" ry="4" fill="#fdf8ec" opacity="0.7"/>
    </g>
    <text x="60" y="190" text-anchor="middle" font-family="Georgia, serif" font-size="14" font-weight="700" fill="#314b20">Bilas Botol</text>
    <text x="60" y="210" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#9c6f44">Pembersihan awal</text>
    <text x="60" y="224" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#9c6f44">air mengalir</text>
  </g>

  <!-- Step 3: Drop / Kirim -->
  <g transform="translate(620,180)">
    <circle cx="60" cy="100" r="55" fill="#fdf8ec" stroke="#c79919" stroke-width="2"/>
    <text x="60" y="50" text-anchor="middle" font-family="Georgia, serif" font-size="34" font-weight="700" fill="#c79919">03</text>
    <!-- Map pin + truck icon -->
    <g transform="translate(40,80)">
      <path d="M20 0 Q10 0 10 12 Q10 22 20 32 Q30 22 30 12 Q30 0 20 0 Z" fill="#5d8a3f"/>
      <circle cx="20" cy="12" r="5" fill="#fdf8ec"/>
    </g>
    <text x="60" y="190" text-anchor="middle" font-family="Georgia, serif" font-size="14" font-weight="700" fill="#314b20">Drop / Kirim</text>
    <text x="60" y="210" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#9c6f44">Bandung: drop point</text>
    <text x="60" y="224" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#9c6f44">Luar kota: min. 5 botol</text>
  </g>

  <!-- Step 4: Reward -->
  <g transform="translate(900,180)">
    <circle cx="60" cy="100" r="55" fill="#fdf8ec" stroke="#c79919" stroke-width="2"/>
    <text x="60" y="50" text-anchor="middle" font-family="Georgia, serif" font-size="34" font-weight="700" fill="#c79919">04</text>
    <!-- Gift icon -->
    <g transform="translate(45,80)">
      <rect x="0" y="10" width="30" height="22" rx="2" fill="#c79919"/>
      <rect x="0" y="10" width="30" height="6" fill="#9c7711"/>
      <rect x="13" y="10" width="4" height="22" fill="#9c7711"/>
      <path d="M15 10 Q5 4 8 0 Q12 -2 15 6 Q18 -2 22 0 Q25 4 15 10 Z" fill="#314b20"/>
    </g>
    <text x="60" y="190" text-anchor="middle" font-family="Georgia, serif" font-size="14" font-weight="700" fill="#314b20">Klaim Reward</text>
    <text x="60" y="210" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#9c6f44">Rp2.000 /botol</text>
    <text x="60" y="224" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#9c6f44">atau 10 Green Points</text>
  </g>

  <!-- Footer band -->
  <rect x="0" y="450" width="1200" height="70" fill="#314b20"/>
  <text x="600" y="488" text-anchor="middle" font-family="Georgia, serif" font-size="16" font-style="italic" fill="#fdf8ec">Kembali Berseri — botol yang kembali, bumi yang asri, tubuh yang sehat.</text>
</svg>
