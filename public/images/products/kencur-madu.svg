      <stop offset="0" stop-color="#fdf0c8"/>
      <stop offset="1" stop-color="#e8c870"/>
    </linearGradient>
    <linearGradient id="km-isi" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f5b838"/>
      <stop offset="0.5" stop-color="#c8861a"/>
